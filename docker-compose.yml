services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autofacodex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autofacodex}
      POSTGRES_DB: ${POSTGRES_DB:-autofacodex}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SHARED_TASKS_DIR: /shared/tasks
    ports:
      - "3000:3000"
    volumes:
      - shared-tasks:/shared/tasks
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SHARED_TASKS_DIR: /shared/tasks
      CODEX_HOME: /home/worker/.codex
      CODEX_BIN: ${CODEX_BIN:-codex}
    volumes:
      - shared-tasks:/shared/tasks
      - ${HOST_CODEX_HOME}/auth.json:/home/worker/.codex/auth.json:ro
      - ${HOST_CODEX_HOME}/config.toml:/home/worker/.codex/config.toml:ro
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
  shared-tasks:
